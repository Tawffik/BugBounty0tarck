name: "🚀 Elite Bug Bounty Pipeline"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target Domain (مثال: example.com)"
        required: true
        type: string
      mode:
        description: "Scan Mode"
        required: true
        type: choice
        options:
          - full
          - quick
          - deep-recon
        default: full

env:
  TARGET: ${{ github.event.inputs.target }}
  MODE: ${{ github.event.inputs.mode }}

permissions:
  contents: read

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup All Tools
        uses: ./.github/actions/setup-bounty-tools

      - name: Prepare Directories
        run: mkdir -p results/${{ env.TARGET }}/{subs,urls,live,findings,cache,certs}

      - name: Subdomain Enumeration + Certificates
        run: |
          TARGET="${{ env.TARGET }}"
          mkdir -p results/$TARGET/subs
          subfinder -d "$TARGET" -all -silent -o results/$TARGET/subs/subfinder.txt
          curl -s "https://crt.sh/?q=%25.$TARGET&output=json" | jq -r '.[].name_value' 2>/dev/null | sed 's/\*\.//g' | grep -i ".$TARGET$" | sort -u > results/$TARGET/subs/crtsh.txt || true
          cat results/$TARGET/subs/*.txt 2>/dev/null | sort -u > results/$TARGET/subs/all.txt

      - name: Web Cache & Archives
        if: env.MODE != 'quick'
        run: |
          TARGET="${{ env.TARGET }}"
          gau "$TARGET" --subs -o results/$TARGET/cache/gau.txt 2>/dev/null || true
          echo "$TARGET" | waybackurls > results/$TARGET/cache/wayback.txt 2>/dev/null || true
          cat results/$TARGET/cache/*.txt 2>/dev/null | uro > results/$TARGET/urls/all_urls.txt || true

      - name: Live Hosts Detection
        run: |
          TARGET="${{ env.TARGET }}"
          httpx -l results/$TARGET/subs/all.txt -silent -status-code -tech-detect -o results/$TARGET/live/live.txt -json || true

      - name: Nuclei Vulnerability Scan
        if: env.MODE == 'full'
        run: |
          TARGET="${{ env.TARGET }}"
          nuclei -list results/$TARGET/live/live.txt -tags exposure,token,secret,misconfig,takeover -severity critical,high -o results/$TARGET/findings/nuclei.txt || true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: bugbounty-${{ env.TARGET }}
          path: results/${{ env.TARGET }}/
          retention-days: 30
